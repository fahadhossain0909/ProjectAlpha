version: "3.9"

# AITOS foundation infra stack (spec section 3.2).
# Only Redis is consumed by the current codebase (Event Bus transport).
# ClickHouse (time-series/logs) and Neo4j (knowledge graph) are included
# now so the Data Layer and Knowledge Graph modules can plug straight in
# without an infra rewrite later.

services:
  redis:
    image: redis:7.2-alpine
    container_name: aitos-redis
    ports:
      - "6379:6379"
    volumes:
      - aitos_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: aitos-clickhouse
    ports:
      - "8123:8123"  # HTTP interface
      - "9000:9000"  # native protocol
    environment:
      CLICKHOUSE_DB: aitos
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - aitos_clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  neo4j:
    image: neo4j:5.19-community
    container_name: aitos-neo4j
    ports:
      - "7474:7474"  # HTTP browser
      - "7687:7687"  # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/changeme
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - aitos_neo4j_data:/data
      - aitos_neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # -- Application containers ---------------------------------------------------
  # Both build from the same image (./Dockerfile); only the command differs.
  # *_HOST/*_URI below point at the other services by their Compose network
  # name (e.g. "redis", not "localhost") -- everything else (log level,
  # Binance credentials, etc.) still comes from .env via env_file.

  aitos-paper:
    build: .
    container_name: aitos-paper
    command: ["python3", "run_paper_trading.py"]
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      CLICKHOUSE_HOST: clickhouse
      NEO4J_URI: bolt://neo4j:7687
    ports:
      - "8090:8090"  # health/metrics -- see aitos/health_server.py
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # LIVE TRADING -- real orders, real money. Requires BINANCE_API_KEY/
  # BINANCE_API_SECRET in .env, and needs an interactive terminal for its
  # startup confirmation (aitos/live_trading.py) -- run it with
  # `docker compose run --rm aitos-live`, NOT `docker compose up -d`,
  # or the confirmation prompt has no stdin to read from. Deliberately
  # excluded from the default Compose profile and given no restart
  # policy -- see deploy/aitos-live.service for why.
  aitos-live:
    build: .
    container_name: aitos-live
    command: ["python3", "run_live_trading.py"]
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      CLICKHOUSE_HOST: clickhouse
      NEO4J_URI: bolt://neo4j:7687
    ports:
      - "8091:8091"
    stdin_open: true
    tty: true
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"
    profiles: ["live"]

volumes:
  aitos_redis_data:
  aitos_clickhouse_data:
  aitos_neo4j_data:
  aitos_neo4j_logs:
